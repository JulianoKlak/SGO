version: '3.8'
services:
  mariadb:
    image: mariadb:10.11
    container_name: sgo_mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: sgo_db
      MYSQL_USER: sgo_user
      MYSQL_PASSWORD: sgo_pass
    ports:
      - "3306:3306"
    volumes:
      - sgo_db_data:/var/lib/mysql
      - ./sgo_db.sql:/docker-entrypoint-initdb.d/sgo_db.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sgo_db_data:
